<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mintGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f0e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d9bf;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#mintGradient)" filter="url(#shadow)"/>
  
  <!-- Subtle inner highlight for depth -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="white" opacity="0.2" style="pointer-events: none;"/>
  
  <!-- Modern sans-serif S -->
  <text x="64" y="85" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="76" font-weight="700" text-anchor="middle" fill="#304529">S</text>
</svg>

